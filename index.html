<!doctype html>

<html lang="ar" dir="rtl">  
<head>  
  <meta charset="utf-8" />  
  <title>Oola Platform</title>  
  <meta name="viewport" content="width=device-width,initial-scale=1" />  
  <style>  
    body{  
      margin:0;  
      font-family:Arial, sans-serif;  
      background:#0f0f0f;  
      color:white;  
      direction: rtl;  
    }  
    header{  
      background:#000;  
      color:#d4af37;  
      padding:15px;  
      text-align:center;  
      font-size:22px;  
    }  
    .container{  
      padding:20px;  
      max-width:800px;  
      margin:auto;  
    }  
    .card{  
      background:#1a1a1a;  
      padding:15px;  
      margin:10px 0;  
      border-radius:10px;  
    }  
    input,button{  
      width:100%;  
      padding:10px;  
      margin:5px 0;  
      border:none;  
      border-radius:8px;  
      box-sizing:border-box;  
    }  
    input[type="email"] { direction: ltr; }  
    button{  
      background:#d4af37;  
      font-weight:bold;  
      cursor:pointer;  
    }  
    .muted { color:#bbb; font-size:14px; }  
    .actions { display:flex; gap:10px; flex-direction:column; }  
    @media(min-width:480px){ .actions { flex-direction:row; } }  
    .error { color:#ffb3b3; }  
    .ok { color:#bff0b3; }  
  </style>  
</head>  
<body>  
  <header>✨ Oola Platform</header>    <div class="container">  
    <h2>🔐 تسجيل الدخول</h2>  <div class="card" id="authCard">  
  <div class="muted" id="userStatus">لم يتم تسجيل الدخول</div>  

  <label for="email" class="muted" style="display:block;margin-bottom:4px;">البريد الإلكتروني</label>
  <input id="email" type="email" placeholder="البريد الإلكتروني" aria-label="email" autocomplete="email" inputmode="email" autocapitalize="none">

  <label for="password" class="muted" style="display:block;margin-bottom:4px;margin-top:8px;">كلمة المرور</label>
  <input id="password" type="password" placeholder="كلمة المرور" aria-label="password" autocomplete="current-password">

  <div class="actions">  
    <button id="signupBtn">إنشاء حساب</button>  
    <button id="loginBtn">تسجيل دخول</button>  
    <button id="logoutBtn" disabled>خروج</button>  
  </div>  

  <div id="message" class="muted" role="status" aria-live="polite"></div>  
</div>  

<hr>  

<h2>👩‍🎨 Artists</h2>  
<div id="artists"></div>

  </div>    <script type="module">  
    (async () => {  
      // --- Config (verify storageBucket in console if you use storage) ---  
      const firebaseConfig = {  
        apiKey: "AIzaSyAoyAArE5JSZvB2h35EjvPojBQyGBL7x8o",  
        authDomain: "oola-house.firebaseapp.com",  
        projectId: "oola-house",  
        // Typical storageBucket format is "<project-id>.appspot.com"  
        storageBucket: "oola-house.appspot.com",  
        messagingSenderId: "152191370232",  
        appId: "1:152191370232:web:f5fb5fbf1b4bb1f0ca8c0d"  
      };  
  
      // Elements  
      const emailEl = document.getElementById('email');  
      const passEl = document.getElementById('password');  
      const signupBtn = document.getElementById('signupBtn');  
      const loginBtn = document.getElementById('loginBtn');  
      const logoutBtn = document.getElementById('logoutBtn');  
      const userStatus = document.getElementById('userStatus');  
      const messageEl = document.getElementById('message');  
      const artistsEl = document.getElementById('artists');  
  
      // Helpers  
      function showMessage(text, isError = false) {  
        messageEl.textContent = text || "";  
        messageEl.className = isError ? "muted error" : "muted ok";  
        // keep aria-live for screen readers  
      }  
      function setButtonsForAuth(isSignedIn){  
        logoutBtn.disabled = !isSignedIn;  
        signupBtn.disabled = isSignedIn;  
        loginBtn.disabled = isSignedIn;  
      }  
      function validateInputs(email, password) {  
        emailEl.removeAttribute('aria-invalid');  
        passEl.removeAttribute('aria-invalid');  
        if (!email) { emailEl.setAttribute('aria-invalid','true'); showMessage("الرجاء إدخال البريد الإلكتروني", true); return false; }  
        if (!password || password.length < 6) { passEl.setAttribute('aria-invalid','true'); showMessage("كلمة المرور يجب أن تكون 6 أحرف على الأقل", true); return false; }  
        return true;  
      }  
      function renderArtistCardDOM(artist){  
        const card = document.createElement('div');  
        card.className = 'card';  
        const name = document.createElement('div');  
        name.style.fontWeight = '700';  
        name.textContent = artist.name || 'Artist';  
        card.appendChild(name);  
        if (artist.description) {  
          const desc = document.createElement('div');  
          desc.textContent = artist.description;  
          card.appendChild(desc);  
        }  
        return card;  
      }  
  
      // Fallback loader for compat scripts  
      function loadScript(url){  
        return new Promise((resolve, reject) => {  
          const s = document.createElement('script');  
          s.src = url;  
          s.onload = () => resolve();  
          s.onerror = () => reject(new Error('Failed to load ' + url));  
          document.head.appendChild(s);  
        });  
      }  
  
      // We'll keep two possible runtimes: 'modular' and 'compat'  
      let runtime = null;  
  
      // Objects the rest of the code will use (populated per runtime)  
      let fbApp, fbAuth, fbDb;  
      let impl = {}; // will hold functions: signup, login, logout, onAuthChange, subscribeArtists  
  
      // Friendly Arabic translations for common Firebase auth errors  
      const firebaseErrorMap = {  
        'auth/email-already-in-use': 'البريد الإلكتروني مستخدم بالفعل.',  
        'auth/invalid-email': 'البريد الإلكتروني غير صالح.',  
        'auth/weak-password': 'كلمة المرور ضعيفة جداً.',  
        'auth/user-not-found': 'المستخدم غير موجود.',  
        'auth/wrong-password': 'كلمة المرور غير صحيحة.',  
        'auth/too-many-requests': 'طلبات كثيرة — حاول لاحقاً.',  
      };  
      function getFriendlyErrorMessage(err) {  
        if (!err) return 'حدث خطأ غير معروف';  
        if (err.code && firebaseErrorMap[err.code]) return firebaseErrorMap[err.code];  
        return err.message || String(err);  
      }  
  
      try {  
        console.info('Attempting modular Firebase import (v10.x)...');  
        const appMod = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');  
        const authMod = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');  
        const firestoreMod = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');  
  
        const { initializeApp } = appMod;  
        const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } = authMod;  
        const { getFirestore, collection, onSnapshot, query, orderBy, limit } = firestoreMod;  
  
        fbApp = initializeApp(firebaseConfig);  
        fbAuth = getAuth(fbApp);  
        fbDb = getFirestore(fbApp);  
        runtime = 'modular';  
        console.info('Using modular Firebase runtime.');  
  
        impl.signup = async (email, password) => createUserWithEmailAndPassword(fbAuth, email, password);  
        impl.login = async (email, password) => signInWithEmailAndPassword(fbAuth, email, password);  
        impl.logout = async () => signOut(fbAuth);  
        impl.onAuthChange = (cb) => onAuthStateChanged(fbAuth, cb);  
  
        // artists subscribe with fallback if orderBy requires an index  
        impl.subscribeArtists = (onData, onError) => {  
          const baseCol = collection(fbDb, 'artists');  
          let activeUnsub = null;  
          try {  
            const q = query(baseCol, orderBy('name'), limit(100));  
            activeUnsub = onSnapshot(q, snapshot => {  
              onData(snapshot);  
            }, err => {  
              console.error('artists snapshot error (ordered):', err);  
              onError && onError(err);  
              // stop ordered listener and attach fallback  
              try { activeUnsub && activeUnsub(); } catch(e) { console.warn('unsub ordered failed', e); }  
              activeUnsub = onSnapshot(baseCol, snapshot2 => onData(snapshot2), err2 => {  
                console.error('artists snapshot error (fallback):', err2);  
                onError && onError(err2);  
              });  
            });  
          } catch (e) {  
            console.warn('Ordered query creation failed, using simple collection listener.', e);  
            activeUnsub = onSnapshot(baseCol, snapshot => onData(snapshot), err => {  
              console.error('artists snapshot error (simple):', err);  
              onError && onError(err);  
            });  
          }  
          // return a function so caller can unsubscribe consistently  
          return () => {  
            try { activeUnsub && activeUnsub(); } catch (e) { console.warn('unsubscribe failed', e); }  
          };  
        };  
  
      } catch (modErr) {  
        console.warn('Modular import failed, falling back to compat SDK. Error:', modErr);  
        // Load compat scripts  
        try {  
          await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js');  
          await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js');  
          await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js');  
          runtime = 'compat';  
          console.info('Using compat Firebase runtime.');  
  
          // Initialize compat  
          fbApp = firebase.initializeApp(firebaseConfig);  
          fbAuth = firebase.auth();  
          fbDb = firebase.firestore();  
  
          impl.signup = (email, password) => fbAuth.createUserWithEmailAndPassword(email, password);  
          impl.login = (email, password) => fbAuth.signInWithEmailAndPassword(email, password);  
          impl.logout = () => fbAuth.signOut();  
          impl.onAuthChange = (cb) => fbAuth.onAuthStateChanged(cb);  
  
          impl.subscribeArtists = (onData, onError) => {  
            const baseCol = fbDb.collection('artists');  
            let activeUnsub = null;  
            try {  
              const q = baseCol.orderBy('name').limit(100);  
              activeUnsub = q.onSnapshot(onData, err => {  
                console.error('artists snapshot error (compat ordered):', err);  
                onError && onError(err);  
                try { activeUnsub && activeUnsub(); } catch(e) { console.warn('unsub compat ordered failed', e); }  
                activeUnsub = baseCol.onSnapshot(onData, err2 => {  
                  console.error('artists snapshot error (compat fallback):', err2);  
                  onError && onError(err2);  
                });  
              });  
            } catch(e){  
              console.warn('compat ordered query failed, using simple listener', e);  
              activeUnsub = baseCol.onSnapshot(onData, onError);  
            }  
            return () => { try { activeUnsub && activeUnsub(); } catch (e) { console.warn('unsubscribe compat failed', e); } };  
          };  
  
        } catch (compatErr) {  
          console.error('Compat fallback failed:', compatErr);  
          showMessage('فشل تحميل مكتبة Firebase. تحقق من الاتصال.', true);  
          return;  
        }  
      }  
  
      console.info('Firebase runtime ready:', runtime);  
  
      // Wire UI to impl  
      signupBtn.addEventListener('click', async () => {  
        const email = emailEl.value.trim();  
        const password = passEl.value;  
        if (!validateInputs(email, password)) return;  
        signupBtn.disabled = true;  
        try {  
          await impl.signup(email, password);  
          showMessage('تم إنشاء الحساب ✔');  
        } catch (e) {  
          console.error('Signup error:', e);  
          showMessage(getFriendlyErrorMessage(e), true);  
        } finally {  
          signupBtn.disabled = false;  
        }  
      });  
  
      loginBtn.addEventListener('click', async () => {  
        const email = emailEl.value.trim();  
        const password = passEl.value;  
        if (!validateInputs(email, password)) return;  
        loginBtn.disabled = true;  
        try {  
          await impl.login(email, password);  
          showMessage('تم تسجيل الدخول ✔');  
        } catch (e) {  
          console.error('Login error:', e);  
          showMessage(getFriendlyErrorMessage(e), true);  
        } finally {  
          loginBtn.disabled = false;  
        }  
      });  
  
      logoutBtn.addEventListener('click', async () => {  
        try {  
          await impl.logout();  
          showMessage('تم تسجيل الخروج');  
        } catch (e) {  
          console.error('Logout error:', e);  
          showMessage(getFriendlyErrorMessage(e), true);  
        }  
      });  
  
      // Auth state observer  
      impl.onAuthChange(user => {  
        if (user) {  
          userStatus.textContent = `مسجل كـ: ${user.email || user.user?.email || user.uid}`;  
          setButtonsForAuth(true);  
        } else {  
          userStatus.textContent = 'لم يتم تسجيل الدخول';  
          setButtonsForAuth(false);  
        }  
      });  
  
      // Subscribe to artists with fallback behavior inside impl  
      try {  
        const unsub = impl.subscribeArtists((snapshot) => {  
          // snapshot may be a compat snapshot or modular snapshot  
          artistsEl.innerHTML = '';  
          let empty = true;  
          try {  
            snapshot.forEach(doc => {  
              empty = false;  
              const data = doc.data();  
              artistsEl.appendChild(renderArtistCardDOM(data));  
            });  
          } catch (e) {  
            console.error('Error iterating snapshot:', e);  
            artistsEl.textContent = 'فشل عرض الفنانين';  
          }  
          if (empty) {  
            artistsEl.textContent = 'لا توجد بيانات Artists حالياً';  
          }  
        }, (err) => {  
          // If ordered query fails because of missing index, we attempt a retry (compat/modular impl already tries fallback).  
          console.warn('artists subscription error reported to UI:', err);  
          // Try to recover: if impl was modular we already attempted fallback, but display message  
          if (err && err.message && /index|ORDER_BY|requires an index/i.test(err.message)) {  
            showMessage('ترتيب النتائج يتطلب فهرسًا في Firestore — سيتم عرض القائمة بدون ترتيب.', true);  
          } else {  
            showMessage('فشل تحميل قائمة الفنانين. تحقق من قواعد Firestore أو الاتصال.', true);  
          }  
        });  
        // Note: unsub is a function you can call to stop listening  
        // window.__artistsUnsub = unsub;  
      } catch (e) {  
        console.error('subscribeArtists threw:', e);  
        artistsEl.textContent = 'فشل تحميل الفنانين';  
      }  
  
      // Detect likely storageBucket mis-format and warn in console/UI  
      if (firebaseConfig.storageBucket && !/\.appspot\.com$/.test(firebaseConfig.storageBucket)) {  
        console.warn('storageBucket does not follow the usual "<project-id>.appspot.com" pattern:', firebaseConfig.storageBucket);  
        // Non-blocking UI hint:  
        showMessage('تحذير: تحقق من إعداد storageBucket في إعدادات Firebase (تحسيني)', true);  
        // Clear the warning after a short delay  
        setTimeout(() => { showMessage(''); }, 5000);  
      }  
  
      console.info('Initialization complete. If something still looks wrong, open the browser console (F12) and paste errors here.');  
    })();  
  </script>  </body>  
</html>
